name: Final project tests

on:
  push:
    paths:
      - "final-project/**"
      - ".github/workflows/final-project-tests.yml"
  pull_request:
    paths:
      - "final-project/**"
      - ".github/workflows/final-project-tests.yml"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python sources
        run: python -m compileall -q src scripts app.py pages
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
